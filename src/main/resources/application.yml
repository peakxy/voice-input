spring:
  application:
    name: voice-input-backend
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 32MB
      max-request-size: 32MB
  data:
    redis:
      repositories:
        enabled: false

server:
  port: 8080

app:
  jwt:
    issuer: voice-input-backend
    secret: voice-input-backend-demo-secret-key-2026-0123456789
    ttl-minutes: 120
  websocket:
    endpoint: /ws/transcript
  asr:
    provider: dashscope
    hotword-default-group: 通用
    model: qwen3-asr-flash-realtime
    api-key: sk-063dc4148ca3405e88a8c23879f9638c
    workspace: default
    url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
  llm:
    model: gpt-5.5
    base-url: https://api-s.zwenooo.link/
    api-key: sk-6su8zF5T3JagKwX44nwLGzhnK6UwtUIbUeB6atnZ1Qtp3gZk
    completions-path: v1/chat/completions
    embeddings-path: v1/embeddings

management:
  endpoints:
    web:
      exposure:
        include: health,info
