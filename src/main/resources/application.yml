spring:
  application:
    name: voice-input-backend
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 32MB
      max-request-size: 32MB
  data:
    redis:
      repositories:
        enabled: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 5

server:
  port: 8080

app:
  jwt:
    issuer: voice-input-backend
    secret: voice-input-backend-demo-secret-key-2026-0123456789
    ttl-minutes: 120
  websocket:
    endpoint: /ws/transcript
    heartbeat:
      interval: 20s
      timeout: 10s
      idle-max: 120s
  asr:
    provider: dashscope
    hotword-default-group: 通用
    model: qwen3-asr-flash-realtime
    api-key: sk-063dc4148ca3405e88a8c2******
    workspace: default
    url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
  llm:
    model: gpt-5.5
    base-url: https://api-s.zwenooo.link/
    api-key: sk-6su8zF5T3JagKwX4******
    completions-path: v1/chat/completions
    embeddings-path: v1/embeddings
  cache:
    user-by-id:
      caffeine: 5m
      redis: 30m
    hotword-list-by-user:
      caffeine: 1m
      redis: 10m
    hotwords-by-user-group:
      caffeine: 1m
      redis: 10m
    recent-transcripts-by-user:
      caffeine: 30s
      redis: 5m
    hotword-seed-all:
      caffeine: 10m
      redis: 1h
  hotword-seed:
    cron: "0 17 4 * * *"
    timeout: 10s
    default-group: 通用
    default-top-n: 50
    user-agent: "voice-input-backend/1.0 (+contact@example.com)"
    sources:
      - name: weibo
        enabled: true
        url: "https://weibo.com/ajax/side/hotSearch"
        parser: weibo
        rpm: 6
      - name: baidu
        enabled: true
        url: "https://top.baidu.com/api/board?tab=realtime"
        parser: baidu
        rpm: 6
      - name: zhihu
        enabled: true
        url: "https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total"
        parser: zhihu
        rpm: 6

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    cn.peakxy.input.client: DEBUG
    cn.peakxy.input.websocket: DEBUG
